services:
  db:
    image: postgres:16-alpine
    container_name: upca-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: upca_dev
      POSTGRES_USER: upca
      POSTGRES_PASSWORD: upca_dev_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U upca -d upca_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
